name: Auto Deploy Strategy Report

on:
  push:
    paths:
      - 'data/**'          # 只要 data 資料夾內的檔案有變動就觸發
  workflow_dispatch:       # 支援在網頁上手動點擊執行

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 複製專案原始碼
        uses: actions/checkout@v4

      - name: 2. 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. 安裝輕量必要套件
        run: |
          pip install pandas plotly

      - name: 4. 切換至 scripts 執行腳本
        run: |
          cd scripts
          python generate_chart.py

      - name: 5. 將生成的網頁發佈至 gh-pages 分支
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
