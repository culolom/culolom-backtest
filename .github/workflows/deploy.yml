name: Auto Generate Strategy Report

on:
  push:
    paths:
      - 'data/**'          # 當 data 資料夾內有任何 CSV 更新時自動觸發
  workflow_dispatch:       # 允許你在 GitHub 網頁上手動點擊執行

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 複製 GitHub 專案檔案
        uses: actions/checkout@v4

      - name: 2. 初始化 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. 安裝必要套件
        run: |
          pip install pandas plotly

      - name: 4. 執行計算腳本
        run: |
          cd scripts
          python generate_chart.py

      - name: 5. 將 dist 內容部署到 GitHub Pages 分支
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
