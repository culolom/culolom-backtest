name: Update Rotation Data

on:
  workflow_dispatch:

  schedule:
    # 台灣時間每天上午 9:30
    # GitHub Actions 使用 UTC，所以是 01:30 UTC
    - cron: "30 1 * * *"

permissions:
  contents: write

jobs:
  update-rotation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Generate rotation JSON
        run: |
          python scripts/update_rotation.py

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add trend_rotation.json

          if git diff --cached --quiet; then
            echo "No rotation data changes."
          else
            git commit -m "Daily auto-update trend_rotation.json 🚀"
            git push
          fi
