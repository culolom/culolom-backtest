name: Update CSV Data

on:
  schedule:
    - cron: "0 22 * * *"   # 台灣時間早上 6 點（UTC+8）
  workflow_dispatch:       # 可以手動按「Run workflow」

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        # 從 v3 升級到 v4 以支援 Node.js 24
        uses: actions/checkout@v4

      - name: Set up Python
        # 從 v4 升級到 v5 以支援 Node.js 24
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run update script
        run: python scripts/update_csv.py

      - name: Commit and Push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/*.csv
          git commit -m "Auto update CSV data $(date '+%Y-%m-%d')" || echo "No changes"
          git push
