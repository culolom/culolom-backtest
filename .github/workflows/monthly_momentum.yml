name: Daily Momentum Update

on:
  schedule:
    # 每天 09:00 (台北時間) 執行，即 UTC 01:00
    # 格式：分 時 日 月 週
    - cron: '0 1 * * *'
  
  workflow_dispatch: # 允許手動執行

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        # 從 v3 升級到 v4 以支援 Node.js 24
        uses: actions/checkout@v4

      - name: Set up Python
        # 從 v4 升級到 v5 以支援 Node.js 24
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pandas yfinance  # 確保有安裝 yfinance 才能跑你的新代號 ^GSPC

      - name: Run calculation script
        # 指向您放置 Python 腳本的路徑
        run: python scripts/update_momentum.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add momentum.json
          git commit -m "Daily auto-update momentum.json 🚀" || echo "No changes to commit"
          git push
